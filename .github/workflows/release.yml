name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 安装 pnpm
      - name: Install pnpm
        run: npm install -g pnpm

      # 关键修复：--no-frozen-lockfile
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build webui
        run: pnpm run build:webui

      - name: Build
        run: pnpm run build

      - name: Package plugin
        run: zip -r "offline-notify.zip" dist/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.get-version.outputs.version }}
          files: napcat-plugin-offline-notification.zip
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger index update
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/update-index.yml/dispatches \
            -d '{"ref":"main"}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
