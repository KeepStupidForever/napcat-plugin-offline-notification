name: Node.js Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 安装 pnpm
      - name: Install pnpm
        run: npm install -g pnpm

      # 关键修复：--no-frozen-lockfile
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build webui
        run: pnpm run build:webui

      - name: Build project
        run: pnpm run build

      - name: Package build files
        run: zip -r build-${{ github.ref_name }}.zip dist/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build-${{ github.ref_name }}.zip
            dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}