name: Node.js Build & Release

# 触发条件：推送 v 开头的标签（如 v1.0.0）自动执行
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须加：允许上传到 Release

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # 你项目用的 Node 版本
          cache: 'npm'      # 自动缓存依赖，加速构建

      # 3. 安装项目依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建项目（核心：生成 dist/ 文件夹）
      - name: Build project
        run: npm run build

      # 5. 打包构建产物（zip 方便下载）
      - name: Package build files
        run: zip -r defult.zip dist/

      # 6. 自动上传到 GitHub Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            defult.zip
            dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
